---
- name: Prepare nodes for Kubernetes (Production-Ready)
  hosts: all
  become: true
  vars:
    kubernetes_version: "1.31"
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Disable swap
      mount:
        name: swap
        fstype: swap
        state: absent
        fstab: /etc/fstab

    - name: Remove swap file if exists
      command: swapoff -a
      when: ansible_swaptotal_mb > 0
      changed_when: false

    - name: Load kernel modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: '0644'
      notify: load modules

    - name: Load modules immediately
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl parameters
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: net.bridge.bridge-nf-call-iptables, value: 1 }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: 1 }
        - { name: net.ipv4.ip_forward, value: 1 }

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - conntrack
          - socat
          - ebtables
          - ethtool
          - ipset
        state: present
        update_cache: yes

    - name: Create systemd-resolved config directory
      file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: '0755'

    - name: Configure systemd-resolved for proper DNS
      copy:
        content: |
          [Resolve]
          DNS=8.8.8.8 8.8.4.4
          FallbackDNS=1.1.1.1
          #Domains=~.
        dest: /etc/systemd/resolved.conf.d/kubernetes.conf
        mode: '0644'
      notify: restart systemd-resolved

    - name: Ensure /etc/resolv.conf is properly linked
      file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: yes

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    - name: Install containerd
      apt:
        name: containerd.io
        state: present

    - name: Create containerd directory
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Configure containerd
      template:
        src: ../templates/containerd-config.toml.j2
        dest: /etc/containerd/config.toml
        mode: '0644'
      notify: restart containerd

    - name: Add Kubernetes GPG key
      apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key
        keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        state: present

    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
        state: present
        filename: kubernetes
        update_cache: yes

    - name: Install Kubernetes packages
      apt:
        name:
          - kubelet={{ kubernetes_version }}.*
          - kubeadm={{ kubernetes_version }}.*
          - kubectl={{ kubernetes_version }}.*
        state: present
        allow_downgrade: yes

    - name: Hold Kubernetes packages
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: yes
        state: started

  handlers:
    - name: restart systemd-resolved
      systemd:
        name: systemd-resolved
        state: restarted
        daemon_reload: yes

    - name: restart containerd
      systemd:
        name: containerd
        state: restarted
        daemon_reload: yes

    - name: load modules
      systemd:
        name: systemd-modules-load
        state: restarted