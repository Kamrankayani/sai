---
- name: Join worker nodes to cluster
  hosts: workers
  become: true
  serial: 1
  
  tasks:
    - name: Check if already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Get current hostname
      command: hostname
      register: current_hostname
      changed_when: false

    - name: Get join command from control plane
      slurp:
        src: /tmp/kubeadm-join-cmd
      delegate_to: "{{ groups['control_plane'][0] }}"
      register: join_cmd

    - name: Set join command
      set_fact:
        join_command: "{{ join_cmd.content | b64decode }}"

    - name: Join worker to cluster
      command: "{{ join_command }} --node-name {{ current_hostname.stdout }}"
      when: not kubelet_conf.stat.exists
      register: join_result

    - name: Restart kubelet after join
      systemd:
        name: kubelet
        state: restarted
        daemon_reload: yes
      when: join_result.changed

    - name: Add worker role label after join
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        kubectl label node {{ current_hostname.stdout }} node-role.kubernetes.io/worker= --overwrite
      delegate_to: "{{ groups['control_plane'][0] }}"
      when: join_result.changed

    - name: Verify node joined successfully
      wait_for:
        timeout: 10
      when: join_result.changed

    - name: Display success message
      debug:
        msg: "✅ {{ inventory_hostname }} joined successfully as {{ current_hostname.stdout }}"