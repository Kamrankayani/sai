---
- name: Join worker nodes to cluster
  hosts: workers
  become: true
  
  tasks:
    - name: Get current hostname
      command: hostname
      register: current_hostname
      changed_when: false

    - name: Display current hostname
      debug:
        msg: "Current hostname is {{ current_hostname.stdout }}"

    - name: Get join command from control plane
      slurp:
        src: /tmp/kubeadm-join-cmd
      delegate_to: "{{ groups['control_plane'][0] }}"
      register: join_cmd

    - name: Set join command
      set_fact:
        join_command: "{{ join_cmd.content | b64decode }}"

    - name: Join worker to cluster with current hostname
      command: "{{ join_command }} --node-name {{ current_hostname.stdout }}"
      args:
        creates: /etc/kubernetes/kubelet.conf

    - name: Restart kubelet
      systemd:
        name: kubelet
        state: restarted
        daemon_reload: yes