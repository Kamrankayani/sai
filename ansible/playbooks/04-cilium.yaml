---
- name: Install Cilium CNI with proper DNS configuration
  hosts: control_plane
  become: true
  
  tasks:
    - name: Download Cilium CLI
      get_url:
        url: https://github.com/cilium/cilium-cli/releases/latest/download/cilium-linux-amd64.tar.gz
        dest: /tmp/cilium.tar.gz
        mode: '0644'

    - name: Extract Cilium CLI
      unarchive:
        src: /tmp/cilium.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Install Cilium binary
      copy:
        src: /tmp/cilium
        dest: /usr/local/bin/cilium
        mode: '0755'
        remote_src: yes

    - name: Clean up temp files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/cilium.tar.gz
        - /tmp/cilium

    - name: Uninstall any existing Cilium installation
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        cilium uninstall --wait
      ignore_errors: true

    - name: Wait for cleanup
      wait_for:
        timeout: 10

    - name: Get control plane private IP
      set_fact:
        control_plane_ip: "{{ hostvars['control-plane']['ansible_default_ipv4']['address'] }}"

    - name: Display control plane IP
      debug:
        msg: "Control plane IP for Cilium: {{ control_plane_ip }}"

    - name: Wait for all nodes to be visible
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        while [ $(kubectl get nodes --no-headers 2>/dev/null | wc -l) -lt 2 ]; do
          echo "Waiting for nodes..."
          sleep 5
        done
        echo "All nodes are visible"

    - name: Install Cilium
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        cilium install \
          --set kubeProxyReplacement=true \
          --set ipam.mode=kubernetes \
          --set k8sServiceHost={{ control_plane_ip }} \
          --set k8sServicePort=6443 \
          --version 1.19.2
      register: cilium_install

    - name: Display installation output
      debug:
        var: cilium_install.stdout_lines
      when: cilium_install.stdout_lines is defined

    - name: Wait for Cilium to be ready
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        cilium status --wait
      register: cilium_status
      changed_when: false
      retries: 30
      delay: 10
      until: cilium_status.rc == 0

    - name: Configure CoreDNS upstream DNS
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        kubectl wait --for=condition=available deployment/coredns -n kube-system --timeout=120s
        kubectl get configmap coredns -n kube-system -o yaml | \
        sed 's|forward . /etc/resolv.conf|forward . 8.8.8.8 8.8.4.4|' | \
        kubectl apply -f -
        kubectl delete pods -n kube-system -l k8s-app=kube-dns
      ignore_errors: true

    - name: Show cluster nodes
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        kubectl get nodes -o wide
      register: nodes_status
      changed_when: false

    - name: Display nodes
      debug:
        var: nodes_status.stdout_lines