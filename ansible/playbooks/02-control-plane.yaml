---
- name: Initialize Kubernetes control plane
  hosts: control_plane
  become: true
  
  tasks:
    - name: Initialize Kubernetes cluster WITHOUT CNI
      command: kubeadm init --pod-network-cidr=10.244.0.0/16 --skip-phases=addon/kube-proxy
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create .kube directory
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy admin.conf to user's kubeconfig
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        remote_src: yes

    - name: Delete kube-proxy daemonset (if created)
      become_user: ubuntu
      command: kubectl delete daemonset kube-proxy -n kube-system
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      ignore_errors: true

    - name: Generate join command
      command: kubeadm token create --print-join-command
      register: join_command

    - name: Save join command on control plane
      copy:
        content: "{{ join_command.stdout }}"
        dest: /tmp/kubeadm-join-cmd
        mode: '0644'

    - name: Display join command
      debug:
        msg: "Worker join command: {{ join_command.stdout }}"