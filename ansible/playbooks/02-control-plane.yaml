---
- name: Initialize Kubernetes control plane
  hosts: control_plane
  become: true
  
  tasks:
    - name: Check if cluster already exists
      stat:
        path: /etc/kubernetes/admin.conf
      register: k8s_admin_conf

    - name: Initialize Kubernetes cluster
      command: kubeadm init --pod-network-cidr=10.244.0.0/16 --skip-phases=addon/kube-proxy
      args:
        creates: /etc/kubernetes/admin.conf
      when: not k8s_admin_conf.stat.exists
      register: kubeadm_init

    - name: Create .kube directory
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy admin.conf to user's kubeconfig
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        remote_src: yes

    - name: Generate join command
      command: kubeadm token create --print-join-command
      register: join_command
      changed_when: false

    - name: Save join command
      copy:
        content: "{{ join_command.stdout }}"
        dest: /tmp/kubeadm-join-cmd
        mode: '0644'

    - name: Display join command
      debug:
        msg: "Worker join command: {{ join_command.stdout }}"